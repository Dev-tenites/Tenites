name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2

      - name: Check forbidden strings
        run: make check-forbidden-strings

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: make build

  proto-gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.28.0'

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.31.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
          go install github.com/cosmos/gogoproto/protoc-gen-gogo@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate protos
        run: |
          cd tenites-chain/proto
          buf dep update
          buf generate --template buf.gen.yaml \
            --path tenites/tsc/v1/

      - name: Verify build after generation
        run: |
          cd tenites-chain
          go build ./...

      - name: Check for uncommitted proto changes
        run: |
          if git diff --name-only | grep -q ".pb.go"; then
            echo "::error::Proto-generated files are out of sync with .proto sources:"
            git diff --name-only | grep ".pb.go"
            exit 1
          fi
          echo "Proto files up to date"
